name: "🖨️ Novo Modelo de Impressora Testado"
description: "Testou o GerPrint com um modelo não listado? Registre aqui para ajudar outros usuários."
labels: ["printer-model", "documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por contribuir com o banco de modelos testados!
        Esta é uma das contribuições mais valiosas para o projeto — não precisa saber programar para ajudar.

  - type: input
    id: fabricante
    attributes:
      label: "Fabricante"
      placeholder: "Canon, Brother, Ricoh, HP, Kyocera, Lexmark, Epson..."
    validations:
      required: true

  - type: input
    id: modelo
    attributes:
      label: "Modelo completo"
      placeholder: "imageRUNNER ADVANCE C3530i"
    validations:
      required: true

  - type: input
    id: oid_contador
    attributes:
      label: "OID do contador de páginas"
      description: "O OID que retornou o valor correto do contador total."
      placeholder: "1.3.6.1.2.1.43.10.2.1.4.1.1"
    validations:
      required: true

  - type: dropdown
    id: snmp_versao
    attributes:
      label: "Versão SNMP"
      options:
        - "v1"
        - "v2c"
        - "v1 e v2c"
    validations:
      required: true

  - type: input
    id: comunidade
    attributes:
      label: "Comunidade SNMP"
      description: "Deixe em branco se for 'public' (padrão)."
      placeholder: "public"

  - type: textarea
    id: oids_toner
    attributes:
      label: "OIDs de toner (opcional)"
      description: "Se descobriu OIDs para nível de toner/tinta, liste aqui com nome e cor."
      placeholder: |
        Preto:  1.3.6.1.2.1.43.11.1.1.9.1.1
        Ciano:  1.3.6.1.2.1.43.11.1.1.9.1.2
        Magenta: 1.3.6.1.2.1.43.11.1.1.9.1.3
        Amarelo: 1.3.6.1.2.1.43.11.1.1.9.1.4

  - type: textarea
    id: observacoes
    attributes:
      label: "Observações"
      description: "Comportamentos especiais, OIDs alternativos, configurações necessárias, etc."
      placeholder: |
        - Impressora multifuncional: OID .4.1.1 retorna apenas impressões via PC.
          Para o total (incluindo cópias), use .4.1.1 + .4.1.2 (configurar múltiplos OIDs).
        - Requer SNMP habilitado no menu: Configurações → Rede → SNMP.

  - type: dropdown
    id: resultado
    attributes:
      label: "Resultado geral"
      options:
        - "✅ Funciona perfeitamente"
        - "⚠️ Funciona com limitações (descrever em observações)"
        - "❌ Não funciona (mas quero registrar para investigação futura)"
    validations:
      required: true
