name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    name: Lint & Django check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Django system check
        env:
          SECRET_KEY: ci-key-not-used-in-production
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
        run: python manage.py check --deploy 2>&1 | grep -v "^System check" || true
        # --deploy levanta avisos de produção; grep filtra a linha de resumo
        # O CI não falha em avisos, apenas em erros reais

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-and-check

    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t gerprint:ci .
