{% extends "impressoras/base.html" %}
{% block title %}Excluir Impressora — GerPrint{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <i class="bi bi-trash3 text-danger fs-1 mb-3"></i>
      <h5>Excluir Impressora</h5>
      <p class="text-muted">Deseja excluir <strong>{{ impressora.nome }}</strong>?<br>Todas as leituras e relatórios serão removidos.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sim, excluir</button>
        <a href="{% url 'impressora_list' %}" class="btn btn-outline-secondary">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
